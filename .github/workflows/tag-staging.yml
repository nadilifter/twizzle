name: Tag Pre-Release Version [Staging]

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [major, minor, patch]

jobs:
  tag:
    name: Tag Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Validate source branch
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Error: this workflow must be run from the 'main' branch. Current branch: '${{ github.ref_name }}'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump and push version tag
        id: bump
        env:
          BUMP_TYPE: ${{ github.event.inputs.version_bump }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: ${LATEST}"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${BUMP_TYPE}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: ${NEW_TAG}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

          git tag "${NEW_TAG}" "${{ github.sha }}"
          git push origin "${NEW_TAG}"

      - name: Trigger deploy-staging workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          gh workflow run deploy-staging.yml \
            --repo uplifterinc/us-clubs \
            --ref main \
            --field deploy_tag="${NEW_TAG}"

      - name: Post summary
        run: |
          echo "### Release Tagged" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.bump.outputs.new_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump Type | ${{ github.event.inputs.version_bump }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tagged By | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The \`deploy-staging\` workflow is now automatically deploying this tag to staging." >> "$GITHUB_STEP_SUMMARY"
