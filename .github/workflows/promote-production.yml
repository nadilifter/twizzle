name: Promote Release [Production]

on:
  workflow_dispatch:
    inputs:
      staging_image_tag:
        description: "Staging image tag to promote (e.g. staging-abc12345). Copy from the staging deployment summary."
        required: true
        type: string
      version_tag:
        description: "Version tag for this release (e.g. v1.2.3). Used as NEXT_PUBLIC_APP_VERSION and Sentry release name. Defaults to git SHA if omitted."
        required: false
        type: string
      release_notes:
        description: "Brief description of what is being released"
        required: false
        type: string

# Prevent concurrent production promotions
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  promote:
    name: Build and Push Production Image
    runs-on: ubuntu-latest
    # GitHub Environment with required reviewers enforces the approval gate.
    # Configure reviewers at: Settings → Environments → production
    environment: production
    permissions:
      id-token: write
      contents: read
    outputs:
      prod_tag: ${{ steps.build.outputs.prod_tag }}

    steps:
      - name: Extract git SHA from staging tag
        id: sha
        env:
          STAGING_TAG: ${{ inputs.staging_image_tag }}
        run: |
          SHORT_SHA="${STAGING_TAG#staging-}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Extracted SHA: ${SHORT_SHA}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate staging image exists in ECR
        env:
          STAGING_TAG: ${{ inputs.staging_image_tag }}
        run: |
          if ! aws ecr describe-images \
            --repository-name "${{ secrets.ECR_REPOSITORY }}" \
            --image-ids "imageTag=${STAGING_TAG}" \
            --query 'imageDetails[0].imageTags' \
            --output text 2>/dev/null | grep -q "${STAGING_TAG}"; then
            echo "Error: image '${STAGING_TAG}' not found in ECR repository '${{ secrets.ECR_REPOSITORY }}'"
            exit 1
          fi
          echo "Validated: ${STAGING_TAG} exists in ECR"

      - name: Checkout repo at ${{ steps.sha.outputs.short_sha }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.short_sha }}

      - name: Fetch build-time secrets from AWS Secrets Manager
        run: |
          SECRET_VAL=$(aws secretsmanager get-secret-value \
            --region us-east-1 \
            --secret-id uplifter/production \
            --query SecretString \
            --output text 2>/dev/null) || {
            echo "ERROR: Failed to retrieve secrets from AWS Secrets Manager"
            exit 1
          }

          parse_secret() {
            printf '%s' "$SECRET_VAL" | sed 's/^[[:space:]]*//' | grep "^${1}=" | head -1 | cut -d= -f2- || true
          }

          NEXT_PUBLIC_ADYEN_CLIENT_KEY=$(parse_secret "NEXT_PUBLIC_ADYEN_CLIENT_KEY")
          NEXT_PUBLIC_ADYEN_ENVIRONMENT=$(parse_secret "NEXT_PUBLIC_ADYEN_ENVIRONMENT")
          NEXT_PUBLIC_SENTRY_DSN=$(parse_secret "NEXT_PUBLIC_SENTRY_DSN")

          [ -n "$NEXT_PUBLIC_ADYEN_CLIENT_KEY" ] || { echo "ERROR: NEXT_PUBLIC_ADYEN_CLIENT_KEY not found in secrets"; exit 1; }
          [ -n "$NEXT_PUBLIC_ADYEN_ENVIRONMENT" ] || { echo "ERROR: NEXT_PUBLIC_ADYEN_ENVIRONMENT not found in secrets"; exit 1; }
          [ -n "$NEXT_PUBLIC_SENTRY_DSN" ] || { echo "ERROR: NEXT_PUBLIC_SENTRY_DSN not found in secrets"; exit 1; }

          echo "::add-mask::$NEXT_PUBLIC_ADYEN_CLIENT_KEY"
          echo "::add-mask::$NEXT_PUBLIC_SENTRY_DSN"

          {
            echo "NEXT_PUBLIC_ADYEN_CLIENT_KEY=$NEXT_PUBLIC_ADYEN_CLIENT_KEY"
            echo "NEXT_PUBLIC_ADYEN_ENVIRONMENT=$NEXT_PUBLIC_ADYEN_ENVIRONMENT"
            echo "NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN"
          } >> "$GITHUB_ENV"

      - name: Build and push production Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
          VERSION_INPUT: ${{ inputs.version_tag }}
        run: |
          PROD_TAG="prod-${SHORT_SHA}"
          APP_VERSION="${VERSION_INPUT:-${SHORT_SHA}}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${PROD_TAG}"

          DOCKER_BUILDKIT=1 docker build \
            --build-arg APP_ENVIRONMENT=production \
            --build-arg NEXT_PUBLIC_APP_ENVIRONMENT=production \
            --build-arg NEXT_PUBLIC_APP_VERSION="${APP_VERSION}" \
            --build-arg NEXT_PUBLIC_ADYEN_CLIENT_KEY="${NEXT_PUBLIC_ADYEN_CLIENT_KEY}" \
            --build-arg NEXT_PUBLIC_ADYEN_ENVIRONMENT="${NEXT_PUBLIC_ADYEN_ENVIRONMENT}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${NEXT_PUBLIC_SENTRY_DSN}" \
            --build-arg SENTRY_RELEASE="${APP_VERSION}" \
            --build-arg SENTRY_AUTH_TOKEN="${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -t "${IMAGE_URI}" \
            .

          docker tag "${IMAGE_URI}" "${ECR_REGISTRY}/${ECR_REPO}:prod-latest"

          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:prod-latest"

          echo "prod_tag=${PROD_TAG}" >> "$GITHUB_OUTPUT"
          echo "Promoted ${STAGING_TAG} → ${PROD_TAG}"

      - name: Post promotion summary
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
          VERSION_INPUT: ${{ inputs.version_tag }}
        run: |
          APP_VERSION="${VERSION_INPUT:-${SHORT_SHA}}"
          echo "### Production Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promoted From | \`${{ inputs.staging_image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Production Tag | \`${{ steps.build.outputs.prod_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App Version / Sentry Release | \`${APP_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sentry Project | \`uplifter-us-prod\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Approved By | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Notes | ${{ inputs.release_notes || 'N/A' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ArgoCD Image Updater will detect the \`prod-*\` tag and sync to the \`production\` namespace."

  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: promote

    steps:
      - name: Wait for ArgoCD rollout
        run: |
          echo "Waiting for ArgoCD Image Updater to detect prod-* tag and sync..."
          sleep 180

      - name: Health check
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              https://uplifterinc.com/api/health || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            [ $i -lt 3 ] && sleep 30
          done
          echo "Production health check failed — consider rolling back via ArgoCD"
          echo "  argocd app rollback uplifter-production"
          exit 1
