name: Deploy — Staging

on:
  push:
    branches: [main]

# Do not cancel in-flight staging deploys — let them finish so staging stays consistent
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging EC2
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Set short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/staging.pem
          chmod 600 /tmp/staging.pem

          ssh -o StrictHostKeyChecking=no -i /tmp/staging.pem "ec2-user@${EC2_HOST}" << 'ENDSSH'
          set -e

          cd ~/uplifter || { echo "Project directory not found"; exit 1; }

          echo "=== Pulling latest code ==="
          git fetch origin
          git reset --hard origin/main

          echo "=== Loading environment variables ==="
          set -a
          source ~/.env.uplifter
          set +a

          echo "=== Building Docker image ==="
          sudo DOCKER_BUILDKIT=1 docker build \
            --build-arg APP_ENVIRONMENT=staging \
            --build-arg NEXT_PUBLIC_APP_ENVIRONMENT=staging \
            --build-arg NEXT_PUBLIC_ADYEN_CLIENT_KEY="${NEXT_PUBLIC_ADYEN_CLIENT_KEY}" \
            --build-arg NEXT_PUBLIC_ADYEN_ENVIRONMENT="${NEXT_PUBLIC_ADYEN_ENVIRONMENT}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${NEXT_PUBLIC_SENTRY_DSN}" \
            -t uplifter:new .

          echo "=== Ensuring PostgreSQL is running ==="
          sudo docker compose -f docker-compose.staging.yml up -d postgres

          echo "=== Waiting for PostgreSQL to be healthy ==="
          RETRIES=30
          COUNT=0
          while [ $COUNT -lt $RETRIES ]; do
            if sudo docker compose -f docker-compose.staging.yml exec -T postgres pg_isready -U uplifter -d uplifter > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            COUNT=$((COUNT + 1))
            sleep 2
          done
          if [ $COUNT -eq $RETRIES ]; then
            echo "PostgreSQL failed to become healthy"
            exit 1
          fi

          echo "=== Running database migrations ==="
          sudo docker run --rm \
            --network uplifter-network \
            -e DATABASE_URL="postgresql://uplifter:${POSTGRES_PASSWORD}@uplifter-postgres:5432/uplifter" \
            uplifter:new \
            prisma migrate deploy

          echo "=== Swapping to new image ==="
          sudo docker tag uplifter:new uplifter:latest

          echo "=== Restarting application ==="
          sudo docker compose -f docker-compose.staging.yml up -d app cron

          echo "=== Cleaning up old images ==="
          sudo docker image prune -f > /dev/null 2>&1 || true

          echo "=== Container status ==="
          sudo docker ps --filter "name=uplifter" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          ENDSSH

          rm -f /tmp/staging.pem

  smoke-test:
    name: Staging Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for application to stabilize
        run: sleep 20

      - name: Health check
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              https://upliftergymnastics.com/api/health || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            [ $i -lt 3 ] && sleep 30
          done
          echo "Health check failed after 3 attempts"
          exit 1

  summarize:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()

    steps:
      - name: Post deployment summary
        run: |
          SMOKE_STATUS="${{ needs.smoke-test.result }}"
          if [ "$SMOKE_STATUS" = "success" ]; then
            STATUS_LABEL="✅ Healthy"
          else
            STATUS_LABEL="❌ Failed"
          fi

          echo "### Staging Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered By | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health | ${STATUS_LABEL} |" >> "$GITHUB_STEP_SUMMARY"
