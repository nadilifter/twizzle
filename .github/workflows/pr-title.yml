name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            chore
            style
            docs
            test
            perf
          requireScope: false
          subjectPattern: ^(US|USC|DEV|LF)-\d+ .+$
          subjectPatternError: |
            PR title must include a ticket number after the type.
            Expected: "type: PREFIX-### description" where PREFIX is US, USC, DEV, or LF
            Example:  "feat: US-42 add billing page"
