# Docker Compose for Staging Environment
# Runs PostgreSQL and the app on a single EC2 instance
# Usage: docker compose -f docker-compose.staging.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: uplifter-postgres
    restart: always
    environment:
      POSTGRES_USER: uplifter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uplifter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uplifter -d uplifter"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uplifter-network

  app:
    image: uplifter:latest
    container_name: uplifter-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ALLOW_OAUTH_ACCOUNT_LINKING: ${ALLOW_OAUTH_ACCOUNT_LINKING}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      ADYEN_API_KEY: ${ADYEN_API_KEY}
      ADYEN_MERCHANT_ACCOUNT: ${ADYEN_MERCHANT_ACCOUNT}
      ADYEN_ENVIRONMENT: ${ADYEN_ENVIRONMENT}
      NEXT_PUBLIC_ADYEN_CLIENT_KEY: ${NEXT_PUBLIC_ADYEN_CLIENT_KEY}
      NEXT_PUBLIC_ADYEN_ENVIRONMENT: ${NEXT_PUBLIC_ADYEN_ENVIRONMENT}
      ADYEN_WEBHOOK_HMAC_KEY: ${ADYEN_WEBHOOK_HMAC_KEY}
      ADYEN_BALANCE_PLATFORM: ${ADYEN_BALANCE_PLATFORM}
      ADYEN_PLATFORM_MERCHANT_ACCOUNT: ${ADYEN_PLATFORM_MERCHANT_ACCOUNT}
      ADYEN_LIABLE_BALANCE_ACCOUNT_ID: ${ADYEN_LIABLE_BALANCE_ACCOUNT_ID}
      ADYEN_BP_CONFIG_WEBHOOK_HMAC_KEY: ${ADYEN_BP_CONFIG_WEBHOOK_HMAC_KEY}
      ADYEN_BP_TRANSFER_WEBHOOK_HMAC_KEY: ${ADYEN_BP_TRANSFER_WEBHOOK_HMAC_KEY}
      ADYEN_BP_NEGBAL_WEBHOOK_HMAC_KEY: ${ADYEN_BP_NEGBAL_WEBHOOK_HMAC_KEY}
      ADYEN_PLATFORM_API_KEY: ${ADYEN_PLATFORM_API_KEY}
      ADYEN_LEM_API_KEY: ${ADYEN_LEM_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_ENVIRONMENT: ${TWILIO_ENVIRONMENT}
      AWS_SES_REGION: ${AWS_SES_REGION}
      AWS_SES_FROM_EMAIL: ${AWS_SES_FROM_EMAIL}
      USE_S3_STORAGE: ${USE_S3_STORAGE}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      CRON_SECRET: ${CRON_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
      ACCOUNTING_ENCRYPTION_KEY: ${ACCOUNTING_ENCRYPTION_KEY}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT}
      NEXT_PUBLIC_STADIA_MAPS_API_KEY: ${NEXT_PUBLIC_STADIA_MAPS_API_KEY}
      NEXT_PUBLIC_APP_ENVIRONMENT: ${NEXT_PUBLIC_APP_ENVIRONMENT}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - uplifter-network

  cron:
    image: alpine:3.19
    container_name: uplifter-cron
    restart: always
    depends_on:
      app:
        condition: service_healthy
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://app:3000
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        CRONTAB="*/5 * * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/process-notifications > /dev/null 2>&1
        * * * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/expire-reservations > /dev/null 2>&1
        0 8 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/recurring-billing > /dev/null 2>&1
        0 6 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/membership-renewal > /dev/null 2>&1
        0 6 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/pass-renewal > /dev/null 2>&1
        */15 * * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/accounting-sync > /dev/null 2>&1
        0 5 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/seasons > /dev/null 2>&1
        0 8 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/holiday-announcements > /dev/null 2>&1
        0 12 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/holiday-reminders > /dev/null 2>&1
        * * * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/sms-campaigns > /dev/null 2>&1
        0 12 * * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/subscription-dunning > /dev/null 2>&1
        0 12 1 * * curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/subscription-billing > /dev/null 2>&1
        0 3 * * 0 curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/cleanup > /dev/null 2>&1
        0 14 * * 1 curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/cron/payment-method-check > /dev/null 2>&1
        "
        echo "$$CRONTAB" | crontab -
        crond -f -l 8
    networks:
      - uplifter-network

volumes:
  postgres_data:
    driver: local

networks:
  uplifter-network:
    external: true
