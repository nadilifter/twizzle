# Docker Compose for Staging Environment
# Runs PostgreSQL and the app on a single EC2 instance
# Usage: docker compose -f docker-compose.staging.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: uplifter-postgres
    restart: always
    environment:
      POSTGRES_USER: uplifter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uplifter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uplifter -d uplifter"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uplifter-network

  app:
    image: uplifter:latest
    container_name: uplifter-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.uplifter
    environment:
      # Override DATABASE_URL to use the container network
      DATABASE_URL: postgresql://uplifter:${POSTGRES_PASSWORD}@postgres:5432/uplifter
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - uplifter-network

volumes:
  postgres_data:
    driver: local

networks:
  uplifter-network:
    external: true
