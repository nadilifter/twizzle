# Staging environment values for Uplifter

replicaCount: 1

image:
  repository: "YOUR_AWS_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/uplifter"
  tag: "" # Set by CI/CD pipeline

env:
  NODE_ENV: "production"
  APP_ENVIRONMENT: "staging"
  AWS_S3_REGION: "us-east-1"
  USE_S3_STORAGE: "true"
  ADYEN_ENVIRONMENT: "TEST"
  TWILIO_ENVIRONMENT: "TEST"

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT:certificate/STAGING_CERT_ID"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: "uplifter-staging"
  hosts:
    - host: "*.upliftergymnastics.com"
      paths:
        - path: /
          pathType: Prefix
    - host: "upliftergymnastics.com"
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

externalServices:
  database:
    host: "staging-postgres.xxxxxx.us-east-1.rds.amazonaws.com"
    port: 5432
  redis:
    host: "staging-redis.xxxxxx.cache.amazonaws.com"
    port: 6379
  s3:
    assetsBucket: "uplifter-gymnastics-assets"
    documentsBucket: "uplifter-gymnastics-docs"
    region: "us-east-1"
    cdnUrl: "https://assets.upliftergymnastics.com"

secrets:
  name: "uplifter-staging-secrets"
