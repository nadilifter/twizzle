services:
  db:
    image: postgres:16-alpine
    container_name: twizzle-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: twizzle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432" # Use 5434 externally to avoid conflicts with other PostgreSQL instances
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting (local development)
  redis:
    image: redis:7-alpine
    container_name: twizzle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible local storage
  minio:
    image: minio/minio
    container_name: twizzle-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog for catching emails locally
  mailhog:
    image: mailhog/mailhog
    container_name: twizzle-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI for viewing emails
    logging:
      driver: none # Disable logging to reduce noise

  # Development mode - use with: docker compose up dev
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: twizzle-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - APP_ENVIRONMENT=local
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/twizzle?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production
      # Redis configuration
      - REDIS_URL=redis://redis:6379
      # S3/MinIO configuration
      - USE_S3_STORAGE=true
      - S3_ENDPOINT=http://minio:9000
      - S3_FORCE_PATH_STYLE=true
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_REGION=us-east-1
      # Email configuration (MailHog)
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SES_ENDPOINT=http://mailhog:1025
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      mailhog:
        condition: service_started
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2"
        reservations:
          memory: 2G

  # Production mode - use with: docker compose up app
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twizzle-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/twizzle?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  minio_data:
