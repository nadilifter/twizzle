# ArgoCD Application for Production Environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uplifter-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # ArgoCD Image Updater — watches for prod-* tags in ECR and updates image.tag automatically.
    # Replace YOUR_ACCOUNT_ID and YOUR_ECR_REPO_NAME with actual values.
    argocd-image-updater.argoproj.io/image-list: uplifter=YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/YOUR_ECR_REPO_NAME
    argocd-image-updater.argoproj.io/uplifter.update-strategy: latest
    argocd-image-updater.argoproj.io/uplifter.allow-tags: regexp:^prod-.*$
    argocd-image-updater.argoproj.io/uplifter.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_ORG/uplifter.git
    targetRevision: main
    path: charts/uplifter
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters:
        - name: image.tag
          value: "latest" # Override with actual tag via ArgoCD Image Updater

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas # Ignore replica count as it's managed by HPA

  info:
    - name: environment
      value: production
    - name: domain
      value: uplifter.app
