# ArgoCD Application for Staging Environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uplifter-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # ArgoCD Image Updater — watches for staging-* tags in ECR and updates image.tag automatically.
    # Replace YOUR_ACCOUNT_ID and YOUR_ECR_REPO_NAME with actual values.
    argocd-image-updater.argoproj.io/image-list: uplifter=YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/YOUR_ECR_REPO_NAME
    argocd-image-updater.argoproj.io/uplifter.update-strategy: latest
    argocd-image-updater.argoproj.io/uplifter.allow-tags: regexp:^staging-.*$
    argocd-image-updater.argoproj.io/uplifter.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_ORG/uplifter.git
    targetRevision: main
    path: charts/uplifter
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
      parameters:
        - name: image.tag
          value: "latest"

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  info:
    - name: environment
      value: staging
    - name: domain
      value: upliftergymnastics.com
