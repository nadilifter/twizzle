# ArgoCD Application for Development Environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uplifter-development
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # ArgoCD Image Updater — watches for dev-* tags in ECR and updates image.tag automatically.
    # Replace YOUR_ACCOUNT_ID and YOUR_ECR_REPO_NAME with actual values.
    argocd-image-updater.argoproj.io/image-list: uplifter=YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/YOUR_ECR_REPO_NAME
    argocd-image-updater.argoproj.io/uplifter.update-strategy: latest
    argocd-image-updater.argoproj.io/uplifter.allow-tags: regexp:^dev-.*$
    argocd-image-updater.argoproj.io/uplifter.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_ORG/uplifter.git
    targetRevision: develop # Deploy from develop branch
    path: charts/uplifter
    helm:
      valueFiles:
        - values.yaml
        - values-development.yaml
      parameters:
        - name: image.tag
          value: "latest"

  destination:
    server: https://kubernetes.default.svc
    namespace: development

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  info:
    - name: environment
      value: development
    - name: domain
      value: upliftergymnastics-dev.com
